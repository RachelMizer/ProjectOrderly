name: Orderly CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  # -------------------------------------------------------
  # BACKEND — Django + pytest
  # -------------------------------------------------------
  backend:
    name: Backend Tests (Django / pytest)
    runs-on: ubuntu-latest
 
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: orderly
          MYSQL_USER: orderly_user
          MYSQL_PASSWORD: localdevpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
 
    env:
      SECRET_KEY: ci-insecure-key-for-testing-only
      DEBUG: "True"
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
 
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
 
      - name: Install dependencies
        working-directory: Orderly
        run: pip install -r requirements.txt
      
      # Tells MySQL to allow 'orderly_user' full permissions so Django can create
      # `test_orderly` when pytest runs.
      - name: Grant test database permissions
        run: |
          mysql -u root -proot -h 127.0.0.1 -e "
            GRANT ALL PRIVILEGES ON \`test_orderly\`.* TO 'orderly_user'@'%';
            GRANT ALL PRIVILEGES ON \`orderly\`.* TO 'orderly_user'@'%';
            FLUSH PRIVILEGES;
          "

      - name: Run migrations
        working-directory: Orderly/backend
        run: python manage.py migrate --noinput # avoids any interactive prompts during migration

      - name: Run pytest
        working-directory: Orderly/backend
        run: pytest tests/ --tb=short -v

  # -------------------------------------------------------
  # FRONTEND — React / Node
  # -------------------------------------------------------
  frontend:
    name: Frontend Checks (React / Node)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Orderly/frontend/package-lock.json

      - name: Install dependencies
        working-directory: Orderly/frontend
        run: npm install # WAS CI but does not work with current caching strategy for package-lock.json

      - name: Run linter
        working-directory: Orderly/frontend
        run: npm run lint


      - name: Run npm tests
        working-directory: Orderly/frontend
        run: npm test -- --watchAll=false

      # -------------------------------------------------------
      # ROBOT FRAMEWORK — Frontend E2E / Acceptance Tests
      # -------------------------------------------------------
      - name: Set up Python for Robot Framework
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies (includes Robot Framework)
        working-directory: Orderly
        run: pip install -r requirements.txt

      - name: Initialize Robot Framework Browser library
        run: rfbrowser init

      - name: Run Robot Framework tests
        working-directory: Orderly/frontend
        run: robot robot/tests
        continue-on-error: true # remove once RF tests are confirmed stable in CI