version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    env_file:
      - ./frontend/.env

  db:
    image: mysql:8
    restart: always
    environment:
      - MYSQL_DATABASE=orderly
      - MYSQL_USER=orderly_user
      - MYSQL_PASSWORD=localdevpass
      - MYSQL_ROOT_PASSWORD=rootpass
