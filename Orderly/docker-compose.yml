version: "3.9"

services:
  db:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: orderly
      MYSQL_USER: orderly_user
      MYSQL_PASSWORD: localdevpass
      MYSQL_ROOT_PASSWORD: rootpass
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    volumes:
      - ./backend:/app
      - ./frontend:/app/frontend
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: gunicorn orderly.wsgi:application --bind 0.0.0.0:8000

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db_data: